specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: 1X Technologies
providerId: 1x-technologies
created: '2026-05-22'
modified: '2026-05-22'
tags:
- Robotics
- Humanoid Robots
- Consumer Robotics
- Home Robotics
- Embodied AI
- World Models
- NEO
- EVE
- ROS2
- Manufacturing
- Open Source
- 1xgpt
- Rate Limiting
- Quotas
- Throttling
description: Scaffolded rate limit definitions for the 1X Technologies API surface. Captures per-tier quotas, burst behavior,
  response signaling, and recovery semantics. Defaults are scaffold values to be replaced with published provider limits.
headers:
  limit: X-RateLimit-Limit
  remaining: X-RateLimit-Remaining
  reset: X-RateLimit-Reset
  retryAfter: Retry-After
  policy: RateLimit-Policy
responseCodes:
  throttled: 429
  quotaExceeded: 429
  serviceUnavailable: 503
limits:
- tier: free
  name: Free Tier Default
  scope: api-key
  metric: requests_per_minute
  limit: 10
  burst: 20
  timeFrame: minute
  applies:
  - https://github.com/1x-technologies/1xgpt
  description: Default per-token request rate for the free tier. Bursts above the limit return HTTP 429 with Retry-After.
- tier: pro
  name: Pro Tier Default
  scope: api-key
  metric: requests_per_minute
  limit: 120
  burst: 240
  timeFrame: minute
  applies:
  - https://github.com/1x-technologies/1xgpt
  description: Higher rate envelope for paid plans; reconcile against published commercial terms.
recoveryStrategies:
- name: Exponential Backoff
  description: Wait Retry-After seconds (or back off exponentially up to 60s) before retrying.
- name: Queue and Retry
  description: Submit bulk work in batches under the burst envelope.
notes:
- Replace scaffold values with the provider's published rate limit policy.
