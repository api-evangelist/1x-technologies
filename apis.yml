aid: 1x-technologies
name: 1X Technologies
description: >-
  1X Technologies is a humanoid robotics company headquartered in Palo Alto,
  California with vertically integrated manufacturing at the NEO Factory in
  Hayward. Its product line includes EVE (an earlier wheeled-base humanoid
  used for commercial pilots) and NEO, the company's bipedal consumer
  humanoid marketed as the "world's first consumer-ready humanoid robot for
  the home," with NEO Beta and NEO Gamma development variants and a
  consumer pre-order program. 1X is an OpenAI portfolio company and
  collaborates with NVIDIA on training-data generation and on-board model
  execution. The company maintains a public GitHub organization
  (github.com/1x-technologies) with 24 repositories, most notably 1xgpt — a
  world-modeling challenge for humanoid robots — alongside Halodi robot URDF
  models, ROS2 examples for the EVE robot, and robotics infrastructure tools.
  1X does not publish a public hosted API or developer SDK; engagement is
  via product purchase, research challenges, and open-source code.
